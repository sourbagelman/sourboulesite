<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bread Club Account | The Sour Boule</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    body {
      background: #0f0f0f;
      color: #f5f5f5;
      font-family: Inter, sans-serif;
    }

    .account-shell {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .account-card {
      background: #171717;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 14px 34px rgba(0,0,0,.35);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #222;
      color: white;
      margin-top: 6px;
    }

    button {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #d7b46a;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
    }

    .danger {
      background: #ff6b6b;
    }

    .muted {
      color: #aaa;
      font-size: .9rem;
    }
  </style>
</head>

<body>

<!-- SAME HEADER AS SITE -->
<header>
  <div class="container nav">

    <div class="brand">
      <img src="images/logo.png" class="brand-mark">
      <span>The Sour Boule</span>
    </div>

    <nav class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link active" href="breadclub.html">Bread Club</a>
      <a class="nav-link" href="about.html">About</a>
      <a class="nav-link" href="catering.html">Catering</a>
      <a class="nav-link" href="events.html">Private Events</a>
      <a class="nav-link" href="gallery.html">Gallery</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </nav>

    <div class="nav-actions">
      <a class="btn secondary" href="menu.html">Menu</a>
      <a class="btn primary" href="#">Order Now</a>
    </div>

  </div>
</header>

<main class="account-shell">

  <!-- LOGIN -->
  <div id="loginView" class="account-card">
    <h2>Bread Club Login</h2>
    <p class="muted">Use your Bread Club email to access your account.</p>

    <form id="loginForm">
      <input id="email" type="email" placeholder="oscar@thesourboule.com" required />
      <button type="submit">Email Me a Login Link</button>
    </form>

    <div id="status" class="muted"></div>
  </div>

  <!-- ACCOUNT -->
  <div id="accountView" class="account-card" style="display:none;">
    <h2>Your Bread Club</h2>

    <p id="accountEmail" class="muted"></p>

    <div id="subscriptionData" class="muted" style="margin-top:12px;"></div>

    <div style="margin-top:18px;">
      <button id="pauseBtn" class="secondary">Pause</button>
      <button id="resumeBtn" class="secondary">Resume</button>
      <button id="cancelBtn" class="danger">Cancel</button>
    </div>

    <button id="logoutBtn" class="secondary" style="margin-top:18px;">Sign Out</button>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://wbhedqwubgmsqgcugimf.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_WZpmBHBuZXnFmpVVwQ871Q_zraxbOX_";
const FUNCTION_URL = "https://wbhedqwubgmsqgcugimf.supabase.co/functions/v1/manage-breadclub-subscription";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginView = document.getElementById("loginView");
const accountView = document.getElementById("accountView");

const loginForm = document.getElementById("loginForm");
const status = document.getElementById("status");

const accountEmail = document.getElementById("accountEmail");
const subscriptionData = document.getElementById("subscriptionData");

const pauseBtn = document.getElementById("pauseBtn");
const resumeBtn = document.getElementById("resumeBtn");
const cancelBtn = document.getElementById("cancelBtn");
const logoutBtn = document.getElementById("logoutBtn");

let currentMember = null;

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;

  status.textContent = "Sending login link...";

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: window.location.href
    }
  });

  if (error) {
    status.textContent = error.message;
  } else {
    status.textContent = "Check your email.";
  }
});

async function loadAccount() {
  const { data } = await supabase.auth.getUser();

  if (!data.user) return;

  const email = data.user.email;

  accountEmail.textContent = email;

  const { data: member } = await supabase
    .from("bread_club_members")
    .select("*")
    .eq("email", email)
    .order("created_at", { ascending: false })
    .limit(1)
    .single();

  if (!member) return;

  currentMember = member;

  subscriptionData.innerHTML = `
    Status: ${member.status}<br>
    Pickup: ${member.pickup_day}<br>
    Frequency: ${member.frequency}
  `;

  loginView.style.display = "none";
  accountView.style.display = "block";
}

async function manage(action) {
  if (!currentMember) return;

  await fetch(FUNCTION_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      action,
      subscription_id: currentMember.square_subscription_id,
      member_id: currentMember.id
    })
  });

  loadAccount();
}

pauseBtn.onclick = () => manage("pause");
resumeBtn.onclick = () => manage("resume");
cancelBtn.onclick = () => manage("cancel");

logoutBtn.onclick = async () => {
  await supabase.auth.signOut();
  location.reload();
};

loadAccount();
</script>

</body>
</html>
