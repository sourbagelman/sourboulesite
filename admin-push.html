```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sour Boule Push Notifications</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f7f7f7;
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    margin-bottom:20px;
}

h1,h2{
    margin-top:0;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:16px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:black;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.secondary{
    background:#666;
}

.topbar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:15px;
}

.small{
    color:#666;
    font-size:14px;
}

.counter{
    text-align:right;
    color:#666;
    font-size:13px;
    margin-top:-10px;
    margin-bottom:12px;
}

.history-item{
    border-bottom:1px solid #eee;
    padding:12px 0;
}

.history-item:last-child{
    border-bottom:none;
}

.history-title{
    font-weight:600;
}

.history-body{
    color:#666;
    margin-top:4px;
}

.history-date{
    color:#999;
    font-size:12px;
    margin-top:4px;
}

#sender{
    display:none;
}

#historyCard{
    display:none;
}

#status{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card" id="loginCard">

    <h1>Sour Boule Push Admin</h1>

    <p class="small">
        Enter the admin password.
    </p>

    <input
        type="password"
        id="password"
        placeholder="Admin Password"
    >

    <button onclick="login()">
        Login
    </button>

</div>

<div class="card" id="sender">

    <div class="topbar">
        <button class="secondary" onclick="logout()">
            Logout
        </button>
    </div>

    <h1>Send Push Notification</h1>

    <label>Title</label>

    <input
        id="title"
        value="The Sour Boule"
        placeholder="Fresh Bread Alert"
    >

    <label>Message</label>

    <textarea
        id="message"
        rows="5"
        maxlength="150"
        placeholder="Fresh sourdough is available now."
        oninput="updateCounter()"
    ></textarea>

    <div class="counter" id="counter">
        0 / 150
    </div>

    <button onclick="sendNotification()">
        Send Notification
    </button>

    <div id="status"></div>

</div>

<div class="card" id="historyCard">

    <h2>Recent Notifications</h2>

    <div id="history">
        Loading...
    </div>

</div>

<script>

const SEND_URL =
"https://wbhedqwubgmsqgcugimf.supabase.co/functions/v1/send-push";

const HISTORY_URL =
"https://wbhedqwubgmsqgcugimf.supabase.co/functions/v1/get-push-history";

const STORAGE_KEY =
"sour_boule_push_password";

window.onload = () => {

    const saved =
        localStorage.getItem(STORAGE_KEY);

    if(saved){
        showAdmin();
    }

    updateCounter();
};

function login(){

    const password =
        document.getElementById("password").value.trim();

    if(!password){
        return;
    }

    localStorage.setItem(STORAGE_KEY,password);

    showAdmin();
}

function logout(){

    localStorage.removeItem(STORAGE_KEY);

    location.reload();
}

function showAdmin(){

    document.getElementById("loginCard").style.display = "none";
    document.getElementById("sender").style.display = "block";
    document.getElementById("historyCard").style.display = "block";

    loadHistory();
}

function updateCounter(){

    const text =
        document.getElementById("message").value;

    document.getElementById("counter").innerHTML =
        text.length + " / 150";
}

async function sendNotification(){

    const title =
        document.getElementById("title").value.trim();

    const body =
        document.getElementById("message").value.trim();

    const password =
        localStorage.getItem(STORAGE_KEY);

    if(!body){
        alert("Enter a notification message.");
        return;
    }

    const confirmed = confirm(
        "Send this notification?\n\n" +
        "Title: " + title + "\n\n" +
        "Message: " + body
    );

    if(!confirmed){
        return;
    }

    const status =
        document.getElementById("status");

    status.innerHTML = "Sending...";

    try{

        const response = await fetch(
            SEND_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "x-push-admin-secret":password
                },
                body:JSON.stringify({
                    title:title,
                    body:body
                })
            }
        );

        const result =
            await response.json();

        if(response.ok){

            status.innerHTML =
                "✅ Notification sent successfully.<br><br>" +
                "Delivered to " +
                result.sent +
                " registered device(s).";

            document.getElementById("message").value = "";

            updateCounter();

            loadHistory();

        }else{

            status.innerHTML =
                "❌ " +
                (result.error || "Failed");

        }

    }catch(error){

        status.innerHTML =
            "❌ Connection error";
    }
}

async function loadHistory(){

    const password =
        localStorage.getItem(STORAGE_KEY);

    try{

        const response = await fetch(
            HISTORY_URL,
            {
                headers:{
                    "x-push-admin-secret":password
                }
            }
        );

        const data =
            await response.json();

        const history =
            document.getElementById("history");

        if(!Array.isArray(data)){

            history.innerHTML =
                "Unable to load history.";

            return;
        }

        history.innerHTML = "";

        data.forEach(item => {

            const div =
                document.createElement("div");

            div.className =
                "history-item";

            const date =
                new Date(item.sent_at);

            div.innerHTML =
                `
                <div class="history-title">
                    ${item.title || "The Sour Boule"}
                </div>

                <div class="history-body">
                    ${item.body || ""}
                </div>

                <div class="history-date">
                    ${date.toLocaleString()}
                </div>
                `;

            history.appendChild(div);

        });

    }catch(error){

        document.getElementById("history").innerHTML =
            "Unable to load history.";
    }
}
</script>

</body>
</html>
```
