```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sour Boule Push Notifications</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f7f7f7;
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
    margin-top:0;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:16px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:black;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

#sender{
    display:none;
}

#status{
    margin-top:15px;
    font-weight:bold;
}

.small{
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card" id="loginCard">
    <h1>Sour Boule Push Admin</h1>

    <p class="small">
        Enter the admin password.
    </p>

    <input
        type="password"
        id="password"
        placeholder="Admin Password"
    >

    <button onclick="login()">
        Login
    </button>

    <div id="loginStatus"></div>
</div>

<div class="card" id="sender">
    <h1>Send Push Notification</h1>

    <label>Title</label>
    <input
        id="title"
        placeholder="Fresh Bread Alert"
        value="The Sour Boule"
    >

    <label>Message</label>
    <textarea
        id="message"
        rows="5"
        placeholder="Fresh sourdough is available now."
    ></textarea>

    <button onclick="sendNotification()">
        Send Notification
    </button>

    <div id="status"></div>
</div>

<script>

const FUNCTION_URL =
"https://wbhedqwubgmsqgcugimf.supabase.co/functions/v1/send-push";

const STORAGE_KEY = "sour_boule_push_password";

window.onload = () => {
    const saved = localStorage.getItem(STORAGE_KEY);

    if(saved){
        showSender();
    }
};

function login(){
    const password =
        document.getElementById("password").value.trim();

    if(!password){
        return;
    }

    localStorage.setItem(STORAGE_KEY,password);

    showSender();
}

function showSender(){
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("sender").style.display = "block";
}

async function sendNotification(){

    const title =
        document.getElementById("title").value.trim();

    const body =
        document.getElementById("message").value.trim();

    const password =
        localStorage.getItem(STORAGE_KEY);

    if(!body){
        alert("Enter a notification message.");
        return;
    }

    const status =
        document.getElementById("status");

    status.innerHTML = "Sending...";

    try{

        const response = await fetch(
            FUNCTION_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "x-push-admin-secret":password
                },
                body:JSON.stringify({
                    title:title,
                    body:body
                })
            }
        );

        const result = await response.json();

        if(response.ok){

            status.innerHTML =
                "✅ Sent to "
                + result.sent
                + " device(s)";

            document.getElementById("message").value = "";

        }else{

            status.innerHTML =
                "❌ "
                + (result.error || "Failed");

        }

    }catch(error){

        status.innerHTML =
            "❌ Connection error";

    }
}
</script>

</body>
</html>
