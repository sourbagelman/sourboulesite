<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bread Club Admin</title>

  <style>
    :root {
      --bg: #111;
      --panel: #1b1b1b;
      --panel-2: #222;
      --text: #f5f5f5;
      --muted: #aaa;
      --line: #333;
      --accent: #d7b46a;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
    }

    .hidden { display: none; }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: white;
    }

    button {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      border: 1px solid var(--line);
      color: white;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- LOADING -->
    <div id="loadingView" class="card">
      Checking access...
    </div>

    <!-- LOGIN -->
    <div id="loginView" class="card hidden">
      <h2>Admin Login</h2>
      <form id="loginForm">
        <input id="email" type="email" placeholder="lance@thesourboule.com" required />
        <button type="submit">Send Login Link</button>
      </form>
      <div id="status" style="margin-top:12px;color:var(--muted);"></div>
    </div>

    <!-- UNAUTHORIZED -->
    <div id="unauthorizedView" class="card hidden">
      <h2>Not Authorized</h2>
      <p>Your email signed in, but it is not approved for admin access.</p>
      <button id="logoutBad" class="secondary" type="button">Sign Out</button>
    </div>

    <!-- ADMIN -->
    <div id="adminView" class="hidden">

      <div class="card">
        <h2>Bread Club Admin</h2>
        <div id="adminEmail"></div>
        <button id="logout" class="secondary" type="button">Sign Out</button>
      </div>

      <div class="card">
        <h3>Protected Admin Area</h3>
        <p>If you can see this, login worked and your email is approved.</p>
        <button id="refreshBtn" class="secondary" type="button">Refresh Access Check</button>
        <div id="adminTestStatus" style="margin-top:12px;color:var(--muted);"></div>
      </div>

    </div>

  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://wbhedqwubgmsqgcugimf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WZpmBHBuZXnFmpVVwQ871Q_zraxbOX_";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loadingView = document.getElementById("loadingView");
    const loginView = document.getElementById("loginView");
    const unauthorizedView = document.getElementById("unauthorizedView");
    const adminView = document.getElementById("adminView");
    const refreshBtn = document.getElementById("refreshBtn");
    const adminTestStatus = document.getElementById("adminTestStatus");

    function show(view) {
      [loadingView, loginView, unauthorizedView, adminView].forEach(v => v.classList.add("hidden"));
      view.classList.remove("hidden");
    }

    async function checkAccess() {
      show(loadingView);

      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        show(loginView);
        return;
      }

      const email = (data.user.email || "").toLowerCase().trim();

      if (!email) {
        show(loginView);
        return;
      }

      const { data: admin, error: adminError } = await supabase
        .from("breadclub_admins")
        .select("email")
        .eq("email", email)
        .maybeSingle();

      if (adminError) {
        console.error(adminError);
        show(unauthorizedView);
        return;
      }

      if (!admin) {
        show(unauthorizedView);
        return;
      }

      document.getElementById("adminEmail").innerText = email;
      show(adminView);
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const status = document.getElementById("status");

      status.innerText = "Sending login link...";

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.href
        }
      });

      if (error) {
        status.innerText = error.message || "Could not send login link.";
        return;
      }

      status.innerText = "Check your email.";
    });

    document.getElementById("logout").onclick = async () => {
      await supabase.auth.signOut();
      show(loginView);
    };

    document.getElementById("logoutBad").onclick = async () => {
      await supabase.auth.signOut();
      show(loginView);
    };

    if (refreshBtn) {
      refreshBtn.onclick = async () => {
        adminTestStatus.innerText = "Re-checking access...";
        await checkAccess();
        adminTestStatus.innerText = "Access check complete.";
      };
    }

    supabase.auth.onAuthStateChange(checkAccess);

    checkAccess();
  </script>
</body>
</html>
