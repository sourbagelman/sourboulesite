<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bread Club Admin</title>

  <style>
    :root {
      --bg: #111;
      --panel: #1b1b1b;
      --panel-2: #222;
      --text: #f5f5f5;
      --muted: #aaa;
      --line: #333;
      --accent: #d7b46a;
      --danger: #ff8a8a;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: white;
    }

    button {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      border: 1px solid var(--line);
      color: white;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- LOADING -->
    <div id="loadingView" class="card">
      <h2 style="margin-top:0;">Checking access...</h2>
      <div id="loadingStatus" class="muted">Starting auth check...</div>
      <div id="loadingError" class="error" style="margin-top:12px;"></div>
    </div>

    <!-- LOGIN -->
    <div id="loginView" class="card hidden">
      <h2>Admin Login</h2>
      <form id="loginForm">
        <input id="email" type="email" placeholder="lance@thesourboule.com" required />
        <button id="loginBtn" type="submit">Send Login Link</button>
      </form>
      <div id="status" style="margin-top:12px;color:var(--muted);"></div>
    </div>

    <!-- UNAUTHORIZED -->
    <div id="unauthorizedView" class="card hidden">
      <h2>Not Authorized</h2>
      <p>Your email signed in, but it is not approved for admin access.</p>
      <button id="logoutBad" class="secondary" type="button">Sign Out</button>
    </div>

    <!-- ADMIN -->
    <div id="adminView" class="hidden">
      <div class="card">
        <h2>Bread Club Admin</h2>
        <div id="adminEmail" class="muted"></div>
        <button id="logout" class="secondary" type="button">Sign Out</button>
      </div>

      <div class="card">
        <h3>Protected Admin Area</h3>
        <p>If you can see this, login worked and your email is approved.</p>
        <button id="refreshBtn" class="secondary" type="button">Refresh Access Check</button>
        <div id="adminTestStatus" style="margin-top:12px;color:var(--muted);"></div>
      </div>
    </div>

  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://wbhedqwubgmsqgcugimf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WZpmBHBuZXnFmpVVwQ871Q_zraxbOX_";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const loadingView = document.getElementById("loadingView");
    const loginView = document.getElementById("loginView");
    const unauthorizedView = document.getElementById("unauthorizedView");
    const adminView = document.getElementById("adminView");

    const loadingStatus = document.getElementById("loadingStatus");
    const loadingError = document.getElementById("loadingError");

    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const emailInput = document.getElementById("email");
    const status = document.getElementById("status");

    const logoutBtn = document.getElementById("logout");
    const logoutBadBtn = document.getElementById("logoutBad");
    const adminEmail = document.getElementById("adminEmail");
    const refreshBtn = document.getElementById("refreshBtn");
    const adminTestStatus = document.getElementById("adminTestStatus");

    function show(view) {
      [loadingView, loginView, unauthorizedView, adminView].forEach((v) => v.classList.add("hidden"));
      view.classList.remove("hidden");
    }

    function setLoading(message, error = "") {
      loadingStatus.textContent = message || "";
      loadingError.textContent = error || "";
    }

    async function finishAuthRedirectIfNeeded() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (code) {
        setLoading("Finishing email login...");
        const { error } = await supabase.auth.exchangeCodeForSession(code);

        if (error) {
          throw new Error("Auth redirect failed: " + error.message);
        }

        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
      }
    }

    async function checkAccess() {
      try {
        show(loadingView);
        setLoading("Checking session...");

        await finishAuthRedirectIfNeeded();

        setLoading("Reading session...");
        const { data: sessionData, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
          throw new Error("Session error: " + sessionError.message);
        }

        if (!sessionData?.session) {
          show(loginView);
          return;
        }

        setLoading("Validating user...");
        const { data: userData, error: userError } = await supabase.auth.getUser();

        if (userError) {
          throw new Error("User lookup error: " + userError.message);
        }

        if (!userData?.user) {
          show(loginView);
          return;
        }

        const email = (userData.user.email || "").toLowerCase().trim();

        if (!email) {
          show(loginView);
          return;
        }

        setLoading("Checking admin approval...");
        const { data: admin, error: adminError } = await supabase
          .from("breadclub_admins")
          .select("email")
          .eq("email", email)
          .maybeSingle();

        if (adminError) {
          throw new Error("Admin table error: " + adminError.message);
        }

        if (!admin) {
          show(unauthorizedView);
          return;
        }

        adminEmail.textContent = email;
        show(adminView);
      } catch (err) {
        console.error(err);
        show(loadingView);
        setLoading("Something broke during auth.", err?.message || String(err));
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();
      status.textContent = "Sending login link...";
      loginBtn.disabled = true;

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.href
        }
      });

      loginBtn.disabled = false;

      if (error) {
        status.textContent = error.message || "Could not send login link.";
        return;
      }

      status.textContent = "Check your email and click the login link.";
    });

    logoutBtn.onclick = async () => {
      await supabase.auth.signOut();
      show(loginView);
    };

    logoutBadBtn.onclick = async () => {
      await supabase.auth.signOut();
      show(loginView);
    };

    refreshBtn.onclick = async () => {
      adminTestStatus.textContent = "Re-checking access...";
      await checkAccess();
      adminTestStatus.textContent = "Access check complete.";
    };

    supabase.auth.onAuthStateChange(() => {
      checkAccess();
    });

    checkAccess();
  </script>
</body>
</html>
