<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bread Club Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding:20px; background:#111; color:#fff;">

<h1 style="margin-bottom:20px;">Bread Club Members</h1>

<p id="status" style="margin-bottom:20px; color:#f0cf6e;"></p>

<table border="1" cellpadding="10" id="table" style="border-collapse:collapse; width:100%;">
  <thead style="background:#222;">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Status</th>
      <th>Subscription ID</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SUPABASE_URL = "https://wbhedqwubgmsqgcugimf.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_WZpmBHBuZXnFmpVVwQ871Q_zraxbOX_";
const MANAGE_FUNCTION_URL = "https://wbhedqwubgmsqgcugimf.supabase.co/functions/v1/manage-breadclub-subscription";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const statusEl = document.getElementById("status");

async function cancelSubscription(subscriptionId, memberId) {
  if (!subscriptionId) {
    alert("No Square subscription ID found on this row.");
    return;
  }

  const confirmed = confirm("Cancel this Bread Club subscription?");
  if (!confirmed) return;

  statusEl.textContent = "Canceling subscription...";

  try {
    const response = await fetch(MANAGE_FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({
        subscription_id: subscriptionId,
        member_id: memberId
      })
    });

    const result = await response.json();
    console.log("Manage subscription response:");
    console.log(JSON.stringify(result, null, 2));

    if (!response.ok) {
      statusEl.textContent = "Cancel failed. Check browser console.";
      return;
    }

    statusEl.textContent = "Subscription canceled.";
    await loadMembers();
  } catch (err) {
    console.error(err);
    statusEl.textContent = "Cancel failed. Check browser console.";
  }
}

async function loadMembers() {
  const { data, error } = await client
    .from("bread_club_members")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Supabase load error:", error);
    statusEl.textContent = "Error loading data.";
    return;
  }

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    const squareSubscriptionId = row.square_subscription_id || "";
    const memberId = row.id || "";
    const cancelDisabled = !squareSubscriptionId || row.status === "canceled";

    tr.innerHTML = `
      <td>${row.full_name || ""}</td>
      <td>${row.email || ""}</td>
      <td>${row.status || ""}</td>
      <td>${squareSubscriptionId}</td>
      <td>
        <button
          ${cancelDisabled ? "disabled" : ""}
          data-member-id="${memberId}"
          data-subscription-id="${squareSubscriptionId}"
          style="padding:8px 12px; cursor:${cancelDisabled ? "not-allowed" : "pointer"};"
        >
          Cancel
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  document.querySelectorAll("button[data-member-id]").forEach(btn => {
    btn.addEventListener("click", () => {
      cancelSubscription(
        btn.dataset.subscriptionId,
        btn.dataset.memberId
      );
    });
  });
}

loadMembers();
</script>

</body>
</html>
