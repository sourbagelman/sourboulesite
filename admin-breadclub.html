<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bread Club Admin</title>

  <style>
    :root {
      --bg: #111;
      --panel: #1b1b1b;
      --panel-2: #222;
      --text: #f5f5f5;
      --muted: #aaa;
      --line: #333;
      --accent: #d7b46a;
      --danger: #ff8a8a;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: white;
    }

    button {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      border: 1px solid var(--line);
      color: white;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      white-space: pre-wrap;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-weight: 700;
    }

    .small {
      font-size: 13px;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      font-size: 12px;
      text-transform: capitalize;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button[disabled] {
      opacity: 0.5;
      cursor: not-allowed !important;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="loadingView" class="card">
      <h2 style="margin-top:0;">Checking access...</h2>
      <div id="loadingStatus" class="muted">Starting auth check...</div>
      <div id="loadingError" class="error" style="margin-top:12px;"></div>
    </div>

    <div id="loginView" class="card hidden">
      <h2>Admin Login</h2>
      <form id="loginForm">
        <input id="email" type="email" placeholder="lance@thesourboule.com" required />
        <button id="loginBtn" type="submit">Send Login Link</button>
      </form>
      <div id="status" style="margin-top:12px;color:var(--muted);"></div>
    </div>

    <div id="unauthorizedView" class="card hidden">
      <h2>Not Authorized</h2>
      <p>Your email signed in, but it is not approved for admin access.</p>
      <button id="logoutBad" class="secondary" type="button">Sign Out</button>
    </div>

    <div id="adminView" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 style="margin:0 0 8px 0;">Bread Club Admin</h2>
            <div id="adminEmail" class="muted"></div>
          </div>

          <div class="actions">
            <button id="reloadMembersBtn" class="secondary" type="button">Reload Members</button>
            <button id="logout" class="secondary" type="button">Sign Out</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-top:0;">Bread Club Members</h3>
        <div id="statusEl" class="muted">Loading members...</div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Member</th>
                <th>Email</th>
                <th>Status</th>
                <th>Square Subscription ID</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="membersTableBody">
              <tr>
                <td colspan="5" class="muted">Loading members...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://wbhedqwubgmsqgcugimf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WZpmBHBuZXnFmpVVwQ871Q_zraxbOX_";

    const MEMBERS_TABLE = "bread_club_members";
    const MANAGE_SUBSCRIPTION_URL = `${SUPABASE_URL}/functions/v1/manage-breadclub-subscription`;

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const loadingView = document.getElementById("loadingView");
    const loginView = document.getElementById("loginView");
    const unauthorizedView = document.getElementById("unauthorizedView");
    const adminView = document.getElementById("adminView");

    const loadingStatus = document.getElementById("loadingStatus");
    const loadingError = document.getElementById("loadingError");

    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const emailInput = document.getElementById("email");
    const status = document.getElementById("status");

    const logoutBtn = document.getElementById("logout");
    const logoutBadBtn = document.getElementById("logoutBad");
    const adminEmail = document.getElementById("adminEmail");
    const reloadMembersBtn = document.getElementById("reloadMembersBtn");
    const statusEl = document.getElementById("statusEl");
    const membersTableBody = document.getElementById("membersTableBody");

    function show(view) {
      [loadingView, loginView, unauthorizedView, adminView].forEach((v) => v.classList.add("hidden"));
      view.classList.remove("hidden");
    }

    function setLoading(message, error = "") {
      loadingStatus.textContent = message || "";
      loadingError.textContent = error || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function finishAuthRedirectIfNeeded() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (code) {
        setLoading("Finishing email login...");
        const { error } = await supabase.auth.exchangeCodeForSession(code);

        if (error) {
          throw new Error("Auth redirect failed: " + error.message);
        }

        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
      }
    }

    async function callManageSubscription(action, subscriptionId, memberId) {
      const { data: sessionData, error: sessionError } = await supabase.auth.getSession();

      if (sessionError) {
        throw new Error(sessionError.message);
      }

      const accessToken = sessionData?.session?.access_token;

      if (!accessToken) {
        throw new Error("No active auth session found.");
      }

      const response = await fetch(MANAGE_SUBSCRIPTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${accessToken}`
        },
        body: JSON.stringify({
          action,
          subscription_id: subscriptionId,
          member_id: memberId
        })
      });

      const result = await response.json().catch(() => ({}));

      console.log(`${action} response:`);
      console.log(JSON.stringify(result, null, 2));

      if (!response.ok) {
        throw new Error(result?.error || `${action} failed.`);
      }

      return result;
    }

    async function pauseSubscription(subscriptionId, memberId) {
      if (!subscriptionId) {
        alert("No Square subscription ID found on this row.");
        return;
      }

      const confirmed = window.confirm("Pause this Bread Club subscription?");
      if (!confirmed) return;

      statusEl.textContent = "Pausing subscription...";

      try {
        await callManageSubscription("pause", subscriptionId, memberId);
        statusEl.textContent = "Subscription paused successfully.";
        await loadMembers();
      } catch (err) {
        console.error("Pause error:", err);
        statusEl.textContent = err?.message || "Pause failed. Check browser console.";
      }
    }

    async function resumeSubscription(subscriptionId, memberId) {
      if (!subscriptionId) {
        alert("No Square subscription ID found on this row.");
        return;
      }

      const confirmed = window.confirm("Resume this Bread Club subscription?");
      if (!confirmed) return;

      statusEl.textContent = "Resuming subscription...";

      try {
        await callManageSubscription("resume", subscriptionId, memberId);
        statusEl.textContent = "Subscription resumed successfully.";
        await loadMembers();
      } catch (err) {
        console.error("Resume error:", err);
        statusEl.textContent = err?.message || "Resume failed. Check browser console.";
      }
    }

    async function cancelSubscription(subscriptionId, memberId) {
      if (!subscriptionId) {
        alert("No Square subscription ID found on this row.");
        return;
      }

      const confirmed = window.confirm("Cancel this Bread Club subscription?");
      if (!confirmed) return;

      statusEl.textContent = "Canceling subscription...";

      try {
        await callManageSubscription("cancel", subscriptionId, memberId);
        statusEl.textContent = "Subscription canceled successfully.";
        await loadMembers();
      } catch (err) {
        console.error("Cancel error:", err);
        statusEl.textContent = err?.message || "Cancel failed. Check browser console.";
      }
    }

    async function loadMembers() {
      statusEl.textContent = "Loading members...";
      membersTableBody.innerHTML = `
        <tr>
          <td colspan="5" class="muted">Loading members...</td>
        </tr>
      `;

      const { data, error } = await supabase
        .from(MEMBERS_TABLE)
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Supabase load error:", error);
        statusEl.textContent = "Error loading data.";
        membersTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="error">Error loading data.</td>
          </tr>
        `;
        return;
      }

      if (!data || data.length === 0) {
        statusEl.textContent = "No members found.";
        membersTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="muted">No members found.</td>
          </tr>
        `;
        return;
      }

      statusEl.textContent = `Loaded ${data.length} member(s).`;
      membersTableBody.innerHTML = "";

      data.forEach((row) => {
        const tr = document.createElement("tr");

        const fullName = row.full_name || "";
        const email = row.email || "";
        const statusValue = (row.status || "").toLowerCase();
        const squareSubscriptionId = row.square_subscription_id || "";
        const memberId = row.id || "";

        const pauseDisabled = !squareSubscriptionId || statusValue !== "active";
        const resumeDisabled = !squareSubscriptionId || statusValue !== "paused";
        const cancelDisabled = !squareSubscriptionId || statusValue === "canceled";

        tr.innerHTML = `
          <td>${escapeHtml(fullName)}</td>
          <td>${escapeHtml(email)}</td>
          <td><span class="status-pill">${escapeHtml(statusValue)}</span></td>
          <td class="small">${escapeHtml(squareSubscriptionId)}</td>
          <td>
            <div class="row-actions">
              <button
                ${pauseDisabled ? "disabled" : ""}
                data-action="pause"
                data-member-id="${escapeHtml(memberId)}"
                data-subscription-id="${escapeHtml(squareSubscriptionId)}"
                style="padding:8px 12px; cursor:${pauseDisabled ? "not-allowed" : "pointer"};"
              >
                Pause
              </button>

              <button
                ${resumeDisabled ? "disabled" : ""}
                data-action="resume"
                data-member-id="${escapeHtml(memberId)}"
                data-subscription-id="${escapeHtml(squareSubscriptionId)}"
                style="padding:8px 12px; cursor:${resumeDisabled ? "not-allowed" : "pointer"};"
              >
                Resume
              </button>

              <button
                ${cancelDisabled ? "disabled" : ""}
                data-action="cancel"
                data-member-id="${escapeHtml(memberId)}"
                data-subscription-id="${escapeHtml(squareSubscriptionId)}"
                style="padding:8px 12px; cursor:${cancelDisabled ? "not-allowed" : "pointer"};"
              >
                Cancel
              </button>
            </div>
          </td>
        `;

        membersTableBody.appendChild(tr);
      });

      document.querySelectorAll("button[data-member-id]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          const subscriptionId = btn.dataset.subscriptionId;
          const memberId = btn.dataset.memberId;

          if (action === "pause") {
            pauseSubscription(subscriptionId, memberId);
            return;
          }

          if (action === "resume") {
            resumeSubscription(subscriptionId, memberId);
            return;
          }

          if (action === "cancel") {
            cancelSubscription(subscriptionId, memberId);
          }
        });
      });
    }

    async function checkAccess() {
      try {
        show(loadingView);
        setLoading("Checking session...");

        await finishAuthRedirectIfNeeded();

        setLoading("Reading session...");
        const { data: sessionData, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
          throw new Error("Session error: " + sessionError.message);
        }

        if (!sessionData?.session) {
          show(loginView);
          return;
        }

        setLoading("Validating user...");
        const { data: userData, error: userError } = await supabase.auth.getUser();

        if (userError) {
          throw new Error("User lookup error: " + userError.message);
        }

        if (!userData?.user) {
          show(loginView);
          return;
        }

        const email = (userData.user.email || "").toLowerCase().trim();

        if (!email) {
          show(loginView);
          return;
        }

        setLoading("Checking admin approval...");
        const { data: admin, error: adminError } = await supabase
          .from("breadclub_admins")
          .select("email")
          .eq("email", email)
          .maybeSingle();

        if (adminError) {
          throw new Error("Admin table error: " + adminError.message);
        }

        if (!admin) {
          show(unauthorizedView);
          return;
        }

        adminEmail.textContent = email;
        show(adminView);
        await loadMembers();
      } catch (err) {
        console.error(err);
        show(loadingView);
        setLoading("Something broke during auth.", err?.message || String(err));
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();
      status.textContent = "Sending login link...";
      loginBtn.disabled = true;

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.href
        }
      });

      loginBtn.disabled = false;

      if (error) {
        status.textContent = error.message || "Could not send login link.";
        return;
      }

      status.textContent = "Check your email and click the login link.";
    });

    logoutBtn.onclick = async () => {
      await supabase.auth.signOut();
      show(loginView);
    };

    logoutBadBtn.onclick = async () => {
      await supabase.auth.signOut();
      show(loginView);
    };

    reloadMembersBtn.onclick = async () => {
      await loadMembers();
    };

    supabase.auth.onAuthStateChange(() => {
      checkAccess();
    });

    checkAccess();
  </script>
</body>
</html>
